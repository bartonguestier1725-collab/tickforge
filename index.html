<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TickForge</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#d1d4dc;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh}

#auth-overlay{
  position:fixed;inset:0;background:rgba(6,6,12,0.92);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:100;
}
#auth-overlay .msg{font-size:13px;color:#888;margin-bottom:4px;text-align:center;line-height:1.6}
#auth-overlay input{
  background:#12121f;border:1px solid #2a2a3d;color:#d1d4dc;
  padding:10px 16px;font-size:15px;width:340px;border-radius:6px;outline:none;
  font-family:'Consolas','SF Mono',monospace;
}
#auth-overlay input:focus{border-color:#2962ff}
#auth-overlay button{
  background:#2962ff;color:#fff;border:none;padding:10px 36px;
  font-size:14px;cursor:pointer;border-radius:6px;transition:background 0.15s;
}
#auth-overlay button:hover{background:#1e50d4}
.btn-cancel{background:#333!important}
.btn-cancel:hover{background:#444!important}

#toolbar{
  display:flex;align-items:center;padding:0 10px;
  background:#0c0c14;border-bottom:1px solid #1a1a28;height:44px;gap:10px;
  flex-wrap:nowrap;overflow-x:auto;
}
#status{width:7px;height:7px;border-radius:50%;background:#333;flex-shrink:0}
#status.ok{background:#26a69a}
#status.err{background:#ef5350}

#symbol-select{
  background:#14141f;color:#d1d4dc;border:1px solid #2a2a3d;
  padding:4px 8px;font-size:13px;border-radius:4px;outline:none;cursor:pointer;
  min-width:100px;
}

.tf-group{display:flex;gap:1px;flex-shrink:0}
.tf-btn{
  background:#14141f;color:#555;border:1px solid transparent;
  padding:2px 7px;font-size:10px;cursor:pointer;border-radius:2px;
  transition:all 0.12s;font-weight:600;letter-spacing:0.2px;
}
.tf-btn:hover{color:#aaa;background:#1c1c30}
.tf-btn.active{background:#2962ff;color:#fff}

#info{display:flex;gap:12px;margin-left:auto;align-items:center;font-size:12px;font-family:'Consolas','SF Mono',monospace;flex-shrink:0}
.lbl{color:#444;font-size:9px;margin-right:1px}
.bid{color:#26a69a}.ask{color:#ef5350}
.spread{color:#555}.spread.crossed{color:#ff1744;font-weight:700}
#tps{color:#333;font-size:10px}
#candle-ticks{color:#333;font-size:10px}

#chart-container{width:100%;height:calc(100vh - 44px)}
</style>
</head>
<body>

<div id="auth-overlay">
  <div class="msg">FXは<a href="https://note.com/ishinabegen/membership" target="_blank" style="color:#2962ff">初月無料</a>で試せます</div>
  <input type="text" id="api-key-input" placeholder="tk_xxxxxxxx" spellcheck="false"
    onkeydown="if(event.key==='Enter')submitApiKey()" />
  <div style="display:flex;gap:8px">
    <button onclick="submitApiKey()">Connect</button>
    <button class="btn-cancel" onclick="cancelAuth()">Cancel</button>
  </div>
</div>

<div id="toolbar">
  <div id="status" class="ok"></div>
  <select id="symbol-select"></select>
  <div class="tf-group" id="tf-group"></div>
  <div id="info">
    <span><span class="lbl">B</span><span class="bid" id="bid-val">&mdash;</span></span>
    <span><span class="lbl">A</span><span class="ask" id="ask-val">&mdash;</span></span>
    <span class="spread" id="spread-val">&mdash;</span>
    <span id="tps"></span>
    <span id="candle-ticks"></span>
  </div>
</div>

<div id="chart-container"></div>

<script>
'use strict';

/* ── Symbols & Timeframes ───────────────────── */
const CRYPTO = [
  {sym:'BTCUSDT', d:2, pip:1},
  {sym:'ETHUSDT', d:2, pip:1},
];
const FX = [
  {sym:'USDJPY',d:3,pip:100},{sym:'EURUSD',d:5,pip:10000},{sym:'GBPUSD',d:5,pip:10000},
  {sym:'AUDUSD',d:5,pip:10000},{sym:'USDCHF',d:5,pip:10000},{sym:'USDCAD',d:5,pip:10000},
  {sym:'NZDUSD',d:5,pip:10000},{sym:'EURJPY',d:3,pip:100},{sym:'GBPJPY',d:3,pip:100},
  {sym:'EURGBP',d:5,pip:10000},{sym:'EURCHF',d:5,pip:10000},{sym:'AUDCAD',d:5,pip:10000},
  {sym:'AUDNZD',d:5,pip:10000},{sym:'XAUUSD',d:2,pip:1},
];
const ALL_SYMS = [...CRYPTO, ...FX];
const SYM_MAP = new Map(ALL_SYMS.map(s => [s.sym, s]));
const CRYPTO_SET = new Set(CRYPTO.map(c => c.sym));

const TIMEFRAMES = [
  {label:'Tick',sec:0},
  {label:'1s',sec:1},{label:'5s',sec:5},{label:'15s',sec:15},{label:'30s',sec:30},
  {label:'1m',sec:60},{label:'5m',sec:300},{label:'15m',sec:900},
  {label:'1h',sec:3600},{label:'4h',sec:14400},
  {label:'1D',sec:86400},{label:'1W',sec:604800},{label:'1M',sec:0xFFFF},
];

const JST = 9*3600;
const BUFFER_MS = 60*60*1000;
const BUFFER_MAX = 360000; // hard cap: ~20 min at 300 t/s
const TICK_MAX = 8000;

/* ── State ──────────────────────────────────── */
let apiKey = '';
let ws = null;
let chart = null;
let candleSeries = null, volumeSeries = null;
let currentSymbol = 'BTCUSDT';
let currentTfIdx = 5; // 1m
let tickBuffer = [];
let currentCandle = null, currentVolume = null;
let candleTickCount = 0;
let tickModeBase = 0, tickModeIdx = 0;
let tpsCount = 0, tpsLast = performance.now();
let pendingFxSymbol = null;
let reconnectTimer = null;
let historyReqId = 0; // race condition guard
let cachedInfo = null; // cached symInfo for hot path

// DOM element cache (populated in boot)
let $bid, $ask, $spread, $tps, $candleTicks, $status;
// Change-detection for DOM writes
let _lastBid = '', _lastAsk = '', _lastSp = '', _lastCrossed = null;

/* ── Helpers ────────────────────────────────── */
function symInfo(sym) { return SYM_MAP.get(sym) || {sym,d:5,pip:10000}; }
function isCrypto(sym) { return CRYPTO_SET.has(sym); }
function isTickMode() { return TIMEFRAMES[currentTfIdx].sec === 0; }
function fmtPrice(v) { return v.toFixed(cachedInfo.d); }
function spreadUnit() { return (currentSymbol === 'XAUUSD' || isCrypto(currentSymbol)) ? '$' : 'p'; }

function candleTimeFor(tsMs) {
  const tf = TIMEFRAMES[currentTfIdx];
  if (tf.sec === 0) return 0;
  const tsSec = Math.floor(tsMs/1000) + JST;

  if (tf.sec === 0xFFFF) { // 1M
    const d = new Date(tsSec * 1000);
    return Math.floor(Date.UTC(d.getUTCFullYear(), d.getUTCMonth(), 1) / 1000);
  }
  if (tf.sec === 604800) { // 1W — Monday 00:00
    const d = new Date(tsSec * 1000);
    const day = d.getUTCDay();
    const diff = (day + 6) % 7;
    d.setUTCDate(d.getUTCDate() - diff);
    d.setUTCHours(0,0,0,0);
    return Math.floor(d.getTime() / 1000);
  }
  return Math.floor(tsSec / tf.sec) * tf.sec;
}

function clearSeries() {
  candleSeries.setData([]);
  volumeSeries.setData([]);
}

/* ── addSeries (v4/v5 compat) ───────────────── */
function addS(type, opts) {
  const map = {Candlestick:'CandlestickSeries',Histogram:'HistogramSeries'};
  const st = LightweightCharts[map[type]];
  if (st && chart.addSeries) { try { return chart.addSeries(st, opts); } catch(e){} }
  return chart['add'+type+'Series'](opts);
}

/* ── UI ─────────────────────────────────────── */
function appendOptgroup(sel, label, items, selectedSym) {
  const g = document.createElement('optgroup');
  g.label = label;
  items.forEach(({sym}) => {
    const o = document.createElement('option');
    o.value = sym; o.textContent = sym;
    if (sym === selectedSym) o.selected = true;
    g.appendChild(o);
  });
  sel.appendChild(g);
}

function initUI() {
  const sel = document.getElementById('symbol-select');
  appendOptgroup(sel, 'Crypto', CRYPTO, currentSymbol);
  appendOptgroup(sel, 'FX (API Key)', FX, currentSymbol);
  sel.onchange = e => onSymbolSelect(e.target.value);

  const grp = document.getElementById('tf-group');
  TIMEFRAMES.forEach((tf, i) => {
    const b = document.createElement('button');
    b.className = 'tf-btn' + (i === currentTfIdx ? ' active' : '');
    b.textContent = tf.label;
    b.onclick = () => {
      currentTfIdx = i;
      grp.querySelectorAll('.tf-btn').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      rebuildFromBuffer();
      if (!isTickMode()) loadHistory(currentSymbol, i);
    };
    grp.appendChild(b);
  });
}

/* ── Chart ──────────────────────────────────── */
function initChart() {
  const container = document.getElementById('chart-container');
  chart = LightweightCharts.createChart(container, {
    autoSize: true,
    layout: {
      background:{type:'solid',color:'#0a0a0f'},
      textColor:'#444',
      fontFamily:"'Consolas','SF Mono',monospace",
      fontSize:11,
    },
    grid:{vertLines:{color:'#111118'},horzLines:{color:'#111118'}},
    crosshair:{
      mode:0,
      vertLine:{labelBackgroundColor:'#2962ff'},
      horzLine:{labelBackgroundColor:'#2962ff'},
    },
    rightPriceScale:{borderColor:'#1a1a28',scaleMargins:{top:0.05,bottom:0.18}},
    timeScale:{borderColor:'#1a1a28',timeVisible:true,secondsVisible:true,rightOffset:5},
  });

  volumeSeries = addS('Histogram',{color:'#1a3a5c',priceFormat:{type:'volume'},priceScaleId:'vol'});
  volumeSeries.priceScale().applyOptions({scaleMargins:{top:0.85,bottom:0}});

  candleSeries = addS('Candlestick',{
    upColor:'#26a69a',downColor:'#ef5350',borderVisible:false,
    wickUpColor:'#26a69a',wickDownColor:'#ef5350',
  });

  applyPrecision();
}

function applyPrecision() {
  cachedInfo = symInfo(currentSymbol);
  const pf = {type:'price',precision:cachedInfo.d,minMove:Math.pow(10,-cachedInfo.d)};
  candleSeries.applyOptions({priceFormat:pf});
}

/* ── WebSocket helpers ──────────────────────── */
function attachWsHandlers() {
  ws.onclose = () => { $status.className = 'err'; scheduleReconnect(); };
  ws.onerror = () => { $status.className = 'err'; };
}

function disconnectWs() {
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  if (ws) { ws.onclose = null; ws.onerror = null; ws.close(); ws = null; }
}

function scheduleReconnect() {
  if (reconnectTimer) return;
  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    if (isCrypto(currentSymbol)) connectBinance(currentSymbol);
    else if (apiKey) connectTickAgg(currentSymbol);
  }, 3000);
}

/* ── Connection: Binance ────────────────────── */
function connectBinance(symbol) {
  disconnectWs();
  const stream = symbol.toLowerCase() + '@bookTicker';
  ws = new WebSocket('wss://stream.binance.com:9443/ws/' + stream);
  ws.onopen = () => { $status.className = 'ok'; };
  ws.onmessage = e => {
    const m = JSON.parse(e.data);
    if (m.b && m.a) {
      onTick({
        symbol: m.s,
        best_bid: m.b,
        best_ask: m.a,
        server_ts: Date.now(),
        is_crossed: parseFloat(m.b) > parseFloat(m.a),
      });
    }
  };
  attachWsHandlers();
}

/* ── Connection: Tick Aggregator ─────────────── */
function connectTickAgg(symbol) {
  disconnectWs();
  ws = new WebSocket('wss://tick.hugen.tokyo/ws');
  ws.onopen = () => {
    ws.send(JSON.stringify({type:'auth',api_key:apiKey}));
  };
  ws.onmessage = e => {
    const m = JSON.parse(e.data);
    switch(m.type) {
      case 'auth_ok':
        $status.className = 'ok';
        ws.send(JSON.stringify({type:'subscribe',symbols:[symbol]}));
        break;
      case 'tick': onTick(m); break;
      case 'ping': break;
      case 'error': $status.className = 'err'; break;
    }
  };
  attachWsHandlers();
}

/* ── Symbol Switch (unified) ─────────────────── */
function switchToSymbol(sym) {
  currentSymbol = sym;
  document.getElementById('symbol-select').value = sym;
  resetChartState();
  applyPrecision();
  loadHistory(sym, currentTfIdx);
  if (isCrypto(sym)) connectBinance(sym);
  else connectTickAgg(sym);
}

function onSymbolSelect(sym) {
  if (!isCrypto(sym) && !apiKey) {
    try { apiKey = localStorage.getItem('tick_api_key') || ''; } catch(e) {}
    if (!apiKey) {
      pendingFxSymbol = sym;
      document.getElementById('auth-overlay').style.display = 'flex';
      try { document.getElementById('api-key-input').value = localStorage.getItem('tick_api_key') || ''; } catch(e) {}
      document.getElementById('symbol-select').value = currentSymbol;
      return;
    }
  }
  switchToSymbol(sym);
}

function submitApiKey() {
  apiKey = document.getElementById('api-key-input').value.trim();
  if (!apiKey) return;
  try { localStorage.setItem('tick_api_key', apiKey); } catch(e) {}
  document.getElementById('auth-overlay').style.display = 'none';
  if (pendingFxSymbol) {
    const sym = pendingFxSymbol;
    pendingFxSymbol = null;
    switchToSymbol(sym);
  }
}

function cancelAuth() {
  document.getElementById('auth-overlay').style.display = 'none';
  pendingFxSymbol = null;
}

function resetChartState() {
  tickBuffer = [];
  currentCandle = null; currentVolume = null;
  candleTickCount = 0; tickModeIdx = 0;
  historyReqId++; // invalidate any in-flight loadHistory
  clearSeries();
  $bid.textContent = '\u2014';
  $ask.textContent = '\u2014';
  $spread.textContent = '\u2014';
  $tps.textContent = '';
  $candleTicks.textContent = '';
  _lastBid = ''; _lastAsk = ''; _lastSp = ''; _lastCrossed = null;
}

/* ── Tick Handler (hot path) ──────────────────── */
function onTick(tick) {
  if (tick.symbol !== currentSymbol) return;

  const bid = parseFloat(tick.best_bid);
  const ask = parseFloat(tick.best_ask);
  const mid = (bid + ask) / 2;
  const ts = tick.server_ts;

  // Price display (with change detection)
  const bt = fmtPrice(bid);
  const at = fmtPrice(ask);
  if (bt !== _lastBid) { $bid.textContent = bt; _lastBid = bt; }
  if (at !== _lastAsk) { $ask.textContent = at; _lastAsk = at; }
  const sp = ((ask - bid) * cachedInfo.pip).toFixed(1) + spreadUnit();
  if (sp !== _lastSp) { $spread.textContent = sp; _lastSp = sp; }
  const crossed = tick.is_crossed;
  if (crossed !== _lastCrossed) {
    $spread.className = 'spread' + (crossed ? ' crossed' : '');
    _lastCrossed = crossed;
  }

  // Tick rate
  tpsCount++;
  const now = performance.now();
  if (now - tpsLast >= 1000) {
    $tps.textContent = tpsCount + ' t/s';
    tpsCount = 0; tpsLast = now;
  }

  // Buffer with hard cap
  tickBuffer.push({bid,ask,mid,ts});
  if (tickBuffer.length > BUFFER_MAX) {
    tickBuffer = tickBuffer.slice(-BUFFER_MAX);
  } else if (tickBuffer.length > 1000 && tickBuffer[0].ts < ts - BUFFER_MS) {
    // Batch trim every 1000 ticks
    if (tickBuffer.length % 1000 === 0) {
      const cutoff = ts - BUFFER_MS;
      let lo = 0, hi = tickBuffer.length;
      while (lo < hi) { const m = (lo+hi)>>>1; if (tickBuffer[m].ts < cutoff) lo=m+1; else hi=m; }
      if (lo > 0) tickBuffer = tickBuffer.slice(lo);
    }
  }

  if (isTickMode()) {
    tickModeIdx++;
    $candleTicks.textContent = tickModeIdx + ' ticks';
  } else {
    updateCandleMode(mid, ts);
  }
}

/* ── Tick Mode ──────────────────────────────── */
function rebuildTickMode() {
  clearSeries();
  currentCandle = null; currentVolume = null;
  const slice = tickBuffer.slice(-TICK_MAX);
  tickModeBase = Math.floor(Date.now()/1000) + JST - slice.length;
  tickModeIdx = slice.length;
  chart.timeScale().fitContent();
  $candleTicks.textContent = tickModeIdx + ' ticks';
}

/* ── Candle Mode ────────────────────────────── */
function updateCandleMode(mid, tsMs) {
  const ct = candleTimeFor(tsMs);
  if (!currentCandle || currentCandle.time !== ct) {
    candleTickCount = 1;
    currentCandle = {time:ct,open:mid,high:mid,low:mid,close:mid};
    currentVolume = {time:ct,value:1,color:'#1a3a5c'};
  } else {
    currentCandle.high = Math.max(currentCandle.high, mid);
    currentCandle.low = Math.min(currentCandle.low, mid);
    currentCandle.close = mid;
    candleTickCount++;
    currentVolume.value = candleTickCount;
  }
  candleSeries.update(currentCandle);
  volumeSeries.update(currentVolume);
  $candleTicks.textContent = candleTickCount + ' ticks';
}

function rebuildCandleMode() {
  clearSeries();
  const candleMap = new Map();
  tickBuffer.forEach(({mid,ts}) => {
    const ct = candleTimeFor(ts);
    if (!candleMap.has(ct)) {
      candleMap.set(ct,{time:ct,open:mid,high:mid,low:mid,close:mid,n:1});
    } else {
      const c = candleMap.get(ct);
      c.high = Math.max(c.high, mid); c.low = Math.min(c.low, mid);
      c.close = mid; c.n++;
    }
  });
  const sorted = Array.from(candleMap.values()).sort((a,b) => a.time - b.time);

  const cData = [], vData = [];
  for (const c of sorted) {
    cData.push({time:c.time,open:c.open,high:c.high,low:c.low,close:c.close});
    vData.push({time:c.time,value:c.n,color:'#1a3a5c'});
  }
  candleSeries.setData(cData);
  volumeSeries.setData(vData);

  if (sorted.length > 0) {
    const last = sorted[sorted.length-1];
    currentCandle = {time:last.time,open:last.open,high:last.high,low:last.low,close:last.close};
    currentVolume = {time:last.time,value:last.n,color:'#1a3a5c'};
    candleTickCount = last.n;
  } else {
    currentCandle = null; currentVolume = null; candleTickCount = 0;
  }
  chart.timeScale().fitContent();
}

function rebuildFromBuffer() {
  if (isTickMode()) rebuildTickMode(); else rebuildCandleMode();
}

/* ── Historical Candles ──────────────────────── */
const BINANCE_TF_MAP = {
  1:'1s', 60:'1m', 300:'5m', 900:'15m', 3600:'1h',
  14400:'4h', 86400:'1d', 604800:'1w', 0xFFFF:'1M',
};

async function loadHistory(symbol, tfIdx) {
  if (isTickMode()) return;
  const reqId = ++historyReqId;
  const sec = TIMEFRAMES[tfIdx].sec;

  if (isCrypto(symbol)) {
    const interval = BINANCE_TF_MAP[sec];
    if (!interval) return;
    try {
      const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=1000`;
      const res = await fetch(url);
      if (!res.ok || reqId !== historyReqId) return;
      const raw = await res.json();
      if (reqId !== historyReqId) return; // stale check after await
      const candles = [], vols = [];
      raw.forEach(k => {
        const t = Math.floor(k[0]/1000) + JST;
        candles.push({time:t,open:parseFloat(k[1]),high:parseFloat(k[2]),low:parseFloat(k[3]),close:parseFloat(k[4])});
        vols.push({time:t,value:Math.round(parseFloat(k[5])*100)/100,color:'#1a3a5c'});
      });
      if (candles.length > 0 && reqId === historyReqId) {
        candleSeries.setData(candles);
        volumeSeries.setData(vols);
        currentCandle = {...candles[candles.length-1]};
        currentVolume = vols[vols.length-1];
        candleTickCount = 0;
        chart.timeScale().fitContent();
      }
    } catch(e) { /* silent */ }
  } else {
    try {
      const tfLabel = TIMEFRAMES[tfIdx].label;
      const res = await fetch(
        `https://tick.hugen.tokyo/api/v1/candles/${symbol}?tf=${tfLabel}&count=1000`,
        {headers:{'Authorization':'Bearer '+apiKey}}
      );
      if (!res.ok || reqId !== historyReqId) return;
      const raw = await res.json();
      if (reqId !== historyReqId) return;
      const data = raw.map(d => ({...d, time: d.time + JST}));
      if (data.length > 0 && reqId === historyReqId) {
        candleSeries.setData(data);
        currentCandle = {...data[data.length-1]};
        candleTickCount = 0;
        chart.timeScale().fitContent();
      }
    } catch(e) { /* silent */ }
  }
}

/* ── Boot ───────────────────────────────────── */
(function boot() {
  // Cache DOM elements
  $bid = document.getElementById('bid-val');
  $ask = document.getElementById('ask-val');
  $spread = document.getElementById('spread-val');
  $tps = document.getElementById('tps');
  $candleTicks = document.getElementById('candle-ticks');
  $status = document.getElementById('status');

  initUI();
  initChart();
  loadHistory(currentSymbol, currentTfIdx);
  connectBinance(currentSymbol);
})();
</script>
</body>
</html>
